    <nav>

        </ul>

    <main>
        <br> <br>
        <h3 id="contact"> For any inquries, Contact using the form below</h3>

    <form id="contactform"action="mailto:yourname@email.com" method="post">
    <fieldset>
      <legend>Contact Form</legend>

      <p>
        <label for="salutation">Salutation:</label>
        <select id="salutation" name="salutation" required>
          <option>Mr.</option>
          <option>Ms.</option>
          <option>Mrs.</option>
        </select>
      </p>

      <p>
        <label for="firstName">First name:</label>
        <input type="text" id="firstName" name="firstName" required autofocus>
      </p>

      <p>
        <label for="lastName">Last name:</label>
        <input type="text" id="lastName" name="lastName" required>
      </p>

      <p>
        <label for="phone">Phone number:</label>
        <input type="tel" id="phone" name="phone" placeholder="403-555-5555" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>
      </p>

      <p>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="name@email.com" required>
      </p>

      <p>
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required>
      </p>

      <p>
        Preferred Contact Method:
        <input type="radio" id="emailContact" name="contactMethod" value="Email" required>
        <label for="emailContact">Email</label>

        <input type="radio" id="phoneContact" name="contactMethod" value="Phone">
        <label for="phoneContact">Phone</label>
      </p>

      <p>
        Reason for Contact:
        <input type="checkbox" id="help" name="reason" value="Help" required>
        <label for="help">Help</label>

        <input type="checkbox" id="feedback" name="reason" value="Feedback">
        <label for="feedback">Feedback</label>
      </p>

      <p>
        <label for="message">Body:</label><br>
        <textarea id="message" name="message" required></textarea>
      </p>

      <p>
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">
      </p>
    </fieldset>
  </form>
        
    </main>
</body>
